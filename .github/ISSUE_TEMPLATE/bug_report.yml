name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Before reporting:** check if the issue already exists in [open issues](https://github.com/julianofirme/envsecret/issues).
        For security vulnerabilities, use [Security Advisories](https://github.com/julianofirme/envsecret/security/advisories) instead.

  - type: input
    id: version
    attributes:
      label: envs version
      description: Output of `envs --version` or the release tag you downloaded
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (amd64)
        - Linux (arm64)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. envs init
        2. envs set FOO bar
        3. envs run -- echo $FOO
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output or error messages
      render: shell
