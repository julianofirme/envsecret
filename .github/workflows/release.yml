name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # macOS — native runners so cgo (go-keyring) links against Security.framework
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel  # Intel
          - goos: darwin
            goarch: arm64
            runner: macos-15        # Apple Silicon

          # Linux amd64 — native runner; libsecret-1-dev installed below
          - goos: linux
            goarch: amd64
            runner: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libsecret (Linux)
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          go build -ldflags="-s -w" -o envs-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: envs-${{ matrix.goos }}-${{ matrix.goarch }}
          path: envs-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksum
        working-directory: dist
        run: sha256sum envs-* > checksums.txt && cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/envs-darwin-amd64
            dist/envs-darwin-arm64
            dist/envs-linux-amd64
            dist/checksums.txt
          generate_release_notes: true
