version: "2"

run:
  go: "1.24"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
  settings:
    errcheck:
      # Writing to stdout/stderr in a CLI is fire-and-forget — ignore fmt.Fprint*.
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
